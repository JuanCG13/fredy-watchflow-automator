<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><link rel="stylesheet" as="style" onload="this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?display=swap&family=Inter:wght@400;500;600;700;800;900"/><title>Settings</title><style>*{box-sizing:border-box}body{margin:0;background:#07111f;color:#e5edf7;font-family:Inter,system-ui,sans-serif}.app{min-height:100vh;background:radial-gradient(circle at top left,rgba(20,184,166,.15),transparent 30%),#07111f;padding:28px}.shell{max-width:1180px;margin:0 auto}.head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.logo{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,#14b8a6,#38bdf8);display:grid;place-items:center;color:#02111f;font-weight:900}.head h1{margin:0;font-size:28px}.head p{margin:5px 0 0;color:#8aa0b7}.btn{border:1px solid rgba(148,163,184,.22);background:#0f1b2e;color:#dbeafe;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer}.btn.primary{background:#14b8a6;color:#022c22;border-color:#2dd4bf}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{grid-column:span 4;border:1px solid rgba(148,163,184,.16);background:linear-gradient(180deg,rgba(15,27,46,.96),rgba(8,17,31,.96));border-radius:22px;padding:20px;box-shadow:0 18px 50px rgba(0,0,0,.25)}.card.wide{grid-column:span 8}.card.full{grid-column:1/-1}.card h2,.card h3{margin:0 0 8px}.card p{color:#8aa0b7;line-height:1.55}.metric{font-size:34px;font-weight:900}.badge{display:inline-flex;border-radius:999px;background:rgba(20,184,166,.14);color:#5eead4;border:1px solid rgba(45,212,191,.28);padding:5px 9px;font-size:12px;font-weight:900}.row{display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(148,163,184,.14);border-radius:16px;padding:13px;margin-top:10px;background:rgba(2,6,23,.22)}input,select{width:100%;border:1px solid rgba(148,163,184,.22);background:#07111f;color:#e5edf7;border-radius:12px;padding:11px 12px;margin:8px 0}@media(max-width:900px){.card,.card.wide{grid-column:1/-1}.head{display:block}.app{padding:18px}}</style></head><body><main class="app"><div class="shell"><header class="head"><div class="brand"><div class="logo">W</div><div><h1>Settings</h1><p>Schedule, browser, extraction and alert preferences.</p></div></div><button class="btn primary">New Monitor</button></header><nav class="demo-topnav"><a class="" href="/">Dashboard</a><a class="" href="/monitors">Monitors</a><a class="" href="/runs">Run History</a><a class="" href="/exports">Exports</a><a class="active" href="/settings">Settings</a></nav><div class="grid"><div class="card"><h3>Browser pool</h3><p>Isolated Chromium contexts.</p><button class="btn">Rerun Now</button></div><div class="card"><h3>Alert rules</h3><p>Notify only on critical changes.</p><button class="btn">Save Monitor</button></div><div class="card"><h3>Selectors</h3><p>Schema-based extraction fallback.</p><button class="btn">Save Monitor</button></div></div></div></main>
<style id="stitch-demo-interactions-style">
  .demo-toast-host { position: fixed; right: 24px; bottom: 24px; z-index: 99999; display: grid; gap: 10px; pointer-events: none; }
  .demo-toast { pointer-events: auto; max-width: 360px; border: 1px solid rgba(56,189,248,.35); background: rgba(2,6,23,.92); color: #e2e8f0; border-radius: 14px; padding: 12px 14px; box-shadow: 0 18px 50px rgba(0,0,0,.34); font: 600 12px Inter, system-ui, sans-serif; backdrop-filter: blur(14px); }
  .demo-toast b { display:block; color: #67e8f9; margin-bottom: 3px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
  .demo-modal-backdrop { position: fixed; inset: 0; z-index: 99998; display: none; place-items: center; background: rgba(2,6,23,.58); backdrop-filter: blur(8px); }
  .demo-modal-backdrop.open { display: grid; }
  .demo-modal { width: min(540px, calc(100vw - 32px)); border: 1px solid rgba(56,189,248,.32); background: #0f172a; color: #e2e8f0; border-radius: 18px; padding: 22px; box-shadow: 0 30px 80px rgba(0,0,0,.45); font-family: Inter, system-ui, sans-serif; }
  .demo-modal h3 { margin: 0 0 8px; font: 700 20px Inter, sans-serif; color: #f8fafc; }.demo-modal p{margin:0 0 16px;color:#94a3b8;line-height:1.55;font-size:13px}.demo-modal input,.demo-modal select,.demo-modal textarea{width:100%;margin:7px 0;border:1px solid #334155;border-radius:10px;background:#020617;color:#e2e8f0;padding:10px 12px;font:13px Inter,sans-serif}.demo-modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}.demo-modal-actions button{border:1px solid #334155;border-radius:10px;padding:9px 13px;background:#111827;color:#cbd5e1}.demo-modal-actions button.primary{border-color:rgba(34,211,238,.45);background:rgba(6,182,212,.18);color:#67e8f9}.demo-interactive-pulse{outline:2px solid rgba(56,189,248,.45)!important;box-shadow:0 0 0 6px rgba(56,189,248,.08)!important;transition:box-shadow .2s ease, outline .2s ease}.demo-topnav{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px}.demo-topnav a{border:1px solid rgba(148,163,184,.18);border-radius:999px;padding:8px 12px;color:#94a3b8;text-decoration:none;font-size:12px;font-weight:800}.demo-topnav a.active,.demo-topnav a:hover{color:#67e8f9;border-color:rgba(34,211,238,.35);background:rgba(8,145,178,.12)}
</style>
<script id="stitch-demo-interactions-script">
(() => {
  const route = (path) => { if (window.top && window.top !== window) window.top.location.href = path; else window.location.href = path; };
  const host=document.createElement('div'); host.className='demo-toast-host'; document.body.appendChild(host);
  function toast(title,msg){const el=document.createElement('div');el.className='demo-toast';el.innerHTML=`<b>${title}</b><span>${msg}</span>`;host.appendChild(el);setTimeout(()=>el.remove(),3600)}
  const modal=document.createElement('div');modal.className='demo-modal-backdrop';modal.innerHTML=`<div class="demo-modal"><h3></h3><p></p><div class="demo-fields"></div><div class="demo-modal-actions"><button data-demo-close>Cancel</button><button class="primary" data-demo-confirm>Save</button></div></div>`;document.body.appendChild(modal);
  function openModal(t,p,f=''){modal.querySelector('h3').textContent=t;modal.querySelector('p').textContent=p;modal.querySelector('.demo-fields').innerHTML=f;modal.classList.add('open')}
  modal.addEventListener('click',e=>{if(e.target===modal||e.target.matches('[data-demo-close]'))modal.classList.remove('open');if(e.target.matches('[data-demo-confirm]')){modal.classList.remove('open');toast('Saved in demo','Monitor state updated locally.')}})
  function txt(el){return (el.textContent||'').replace(/\s+/g,' ').trim().toLowerCase()} function mark(el){el.classList.add('demo-interactive-pulse');setTimeout(()=>el.classList.remove('demo-interactive-pulse'),900)}
  async function rerun(type='pricing'){try{const res=await fetch('/api/runs/demo',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({type})});const data=await res.json();toast('Monitor rerun complete',`${data.run?.id||'WF'} → ${data.run?.result||'success'}`)}catch{toast('Run queued','Local demo action completed.')}}
  function download(){const blob=new Blob([JSON.stringify({monitor:'WatchFlow demo',status:'exported',time:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='watchflow-demo-run.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('JSON exported','Demo evidence downloaded.');}
  document.addEventListener('click',async e=>{const el=e.target.closest('button,a,[role="button"],.demo-card'); if(!el)return; const t=txt(el); mark(el); if(el.getAttribute('href')==='#')e.preventDefault();
    if(t.includes('dashboard')) return route('/'); if(t.includes('monitors')) return route('/monitors'); if(t.includes('run history')||t.includes('view all')) return route('/runs'); if(t.includes('exports')) return route('/exports'); if(t.includes('settings')) return route('/settings');
    if(t.includes('new monitor')) return route('/monitors/new'); if(t.includes('download')) return download(); if(t.includes('rerun now')||t.includes('rerun')) return await rerun(t.includes('job')?'jobs':'pricing'); if(t.includes('competitor pricing')) return route('/monitor/competitor-pricing'); if(t.includes('job board')) return route('/monitor/job-board'); if(t.includes('vendor api')) return route('/monitor/vendor-api');
    if(t.includes('save monitor')) return openModal('Monitor saved','This demo keeps the configuration local and safe.','<input value="Competitor pricing watch"/>');
  },true);
  document.querySelectorAll('.rounded-xl,.rounded-lg,.demo-card').forEach(card=>{const t=txt(card); if(t.includes('competitor pricing')||t.includes('job board')||t.includes('vendor api')){card.style.cursor='pointer';card.addEventListener('click',e=>{if(e.target.closest('button,a'))return; if(t.includes('competitor pricing'))route('/monitor/competitor-pricing'); else if(t.includes('job board'))route('/monitor/job-board'); else route('/monitor/vendor-api');})}});
  toast('Interactive demo ready','All WatchFlow navigation options and actions are wired.');
})();
</script></body></html>
